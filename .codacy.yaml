---
# Codacy analysis configuration for @cyclonedx/sign.
#
# Docs: https://docs.codacy.com/repositories-configure/codacy-configuration-file/
#
# NOTE: Codacy's YAML `engines:` block only recognizes the legacy tool
# identifiers. Newer tools (Biome, PMD, PMD7, Trivy, Opengrep, Checkov,
# Agentlinter, Jackson Linter, Spectral, and similar) cannot be turned
# off from this file. They are controlled exclusively from the Codacy
# UI at Repository Settings -> Tool Configuration. For this repo the
# following tools have been disabled there:
#   - Biome (overlaps with ESLint; rules do not fit this codebase)
#   - PMD and PMD7 (Java-centric; TypeScript support is narrow)
#   - Trivy (container / IaC scanner; no IaC in this repo)
# The remaining tools driving the grade are ESLint, Lizard (complexity),
# and markdownlint.

engines:
  # TSLint has been deprecated by its authors since 2019 in favor of
  # typescript-eslint.
  tslint:
    enabled: false

  # Prettier is not used in this repo.
  prettier:
    enabled: false

exclude_paths:
  # Generated build output.
  - dist/**
  - node_modules/**

  # Generated lockfile.
  - package-lock.json

  # Fixture generator script. One-shot build tool, not shipped code;
  # it imports from dist/ at runtime and writes committed fixture
  # files. Analyzers flag non-literal fs access and "unsupported
  # ESM syntax" here, neither of which is actionable.
  - test/fixtures/jsf/build-envelopes.mjs

  # Committed fixture data (test envelopes, PEM keys, interop corpus).
  - test/fixtures/**/*.json
  - test/fixtures/**/*.pem

  # Coverage output.
  - coverage/**
