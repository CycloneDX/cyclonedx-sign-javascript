name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Node 20.19+ is the minimum; vitest 4 and rolldown do not
        # support earlier versions.
        node: ['20', '22', '24']
        os: [ubuntu-latest]
        include:
          # Run a single macOS and Windows job on the current LTS so we
          # catch platform specific regressions without paying the full
          # matrix cost on every push.
          - os: macos-latest
            node: '22'
          - os: windows-latest
            node: '22'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # `npm install` rather than `npm ci` so the runner resolves its
      # own platform-specific optional deps (rolldown ships different
      # native bindings per OS and arch).
      - name: Install dependencies
        run: npm install --no-audit --no-fund --no-progress

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  coverage:
    name: Coverage (upload to Codacy)
    runs-on: ubuntu-latest
    # Coverage upload requires the CODACY_PROJECT_TOKEN secret, which
    # is not available to workflow runs triggered from fork PRs. Run
    # on pushes to main (and workflow_dispatch) and on same-repo PRs.
    if: >
      github.event_name == 'push'
      || github.event_name == 'workflow_dispatch'
      || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund --no-progress

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codacy
        # Requires repo secret CODACY_PROJECT_TOKEN. If unset, the step
        # is a no-op thanks to the outer job `if`.
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage/lcov.info
