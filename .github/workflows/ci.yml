name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Node 20.19+ is the minimum; vitest 4 and rolldown do not
        # support earlier versions.
        node: ['20', '22', '24']
        os: [ubuntu-latest]
        include:
          # Run a single macOS and Windows job on the current LTS so we
          # catch platform specific regressions without paying the full
          # matrix cost on every push.
          - os: macos-latest
            node: '22'
          - os: windows-latest
            node: '22'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # `npm install` rather than `npm ci` so the runner resolves its
      # own platform-specific optional deps (rolldown ships different
      # native bindings per OS and arch).
      - name: Install dependencies
        run: npm install --no-audit --no-fund --no-progress

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
